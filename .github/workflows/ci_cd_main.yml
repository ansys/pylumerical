name: main

on:
  push:
    branches:
      - main

env:
  MAIN_PYTHON_VERSION: '3.14'
  LIBRARY_NAME: 'ansys-lumerical-core'
  DOCUMENTATION_CNAME: 'lumerical.docs.pyansys.com'

# Disable all default permissions at workflow level for security (least privilege principle)
# Individual jobs will explicitly request only the permissions they need
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vulnerabilities:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: PyAnsys Vulnerability check (on main)
        uses: ansys/actions/check-vulnerabilities@v10.2.12
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          python-package-name: ${{ env.LIBRARY_NAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          dev-mode: ${{ github.ref != 'refs/heads/main' }}

  doc-build:
    permissions:
      contents: read # Required by reusable workflow to checkout repository
    uses: ./.github/workflows/common-doc-build-lumerical.yml
    with:
      documentation-cname: ${{ env.DOCUMENTATION_CNAME }}
      skip-doc-build-if-closed: false
    secrets:
      TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYANSYS_CI_BOT_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
      LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}

  tests:
    permissions:
      id-token: write # Required for trusted publisher
      contents: write # Required by reusable workflow for write operations
    uses: ./.github/workflows/common-tests-lumerical.yml
    secrets:
      PYANSYS_CI_BOT_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
      LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}

  doc-deploy-dev:
    name: Upload dev documentation
    if: github.ref == 'refs/heads/main'
    needs: doc-build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to deploy documentation
      pull-requests: write # Needed to add comments to the PR when cleaning pull directory
    steps:
      - name: Deploy the latest documentation
        uses: ansys/actions/doc-deploy-dev@v10.2.12
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
