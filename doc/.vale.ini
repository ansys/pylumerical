# Core settings
# =============

# Location of our `styles`
StylesPath = "styles"

# The options are `suggestion`, `warning`, or `error` (defaults to “warning”).
MinAlertLevel = warning

# By default, `code` and `tt` are ignored.
IgnoredScopes = code, tt

# By default, `script`, `style`, `pre`, and `figure` are ignored.
SkippedScopes = script, style, pre, figure

# WordTemplate specifies what Vale will consider to be an individual word.
WordTemplate = \b(?:%s)\b

# List of Packages to be used for our guidelines
Packages = Google

# Define the Ansys vocabulary
Vocab = ANSYS

[*.{md,rst}]

# Apply the following styles
BasedOnStyles = Vale, Google
Vale.Terms = NO

# Remove Google-specific rules for rules that are not applicable

Google.WordList = NO

# Ignore specific tokens for class references and math roles

TokenIgnores = (:(func|class|meth|attr|py|math):`(?:.|\n)*?`)|(<.*>)|(\|[A-Za-z0-9_]+\|)

# Ignore RST code-block directive content (Vale does not skip it natively with :lineno-start:)
BlockIgnores = (?s)\.\. code-block::.*?(?=\n[^ \t\n]|\z)

# Autosummary/Jinja templates are implementation files, not prose.
[**/source/_templates/**/*.rst]
BasedOnStyles =

# Autosummary-generated stub pages are not prose.
[**/source/**/_autosummary/**/*.rst]
BasedOnStyles =

# LumOpt2 API module pages use dotted module paths as headings (e.g. core.fdtd_session).
[**/source/api/lumopt2/{core,fom,optimizer,parametrization,utils}/*.rst]
Google.Headings = NO
Vale.Repetition = NO
